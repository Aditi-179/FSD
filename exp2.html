<!DOCTYPE html>
<html>
<head>
  <title>Contact Manager</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    background:  #667eea;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: white;
    padding: 25px;
    width: 400px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.3s;
  }

  input:focus {
    border-color: #667eea;
    outline: none;
    box-shadow: 0 0 5px rgba(102,126,234,0.5);
  }

  button {
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #667eea;
    color: white;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #5a67d8;
  }

  .contact {
    background: #f4f4f4;
    padding: 10px;
    margin-top: 12px;
    border-radius: 8px;
  }

  .contact button {
    margin-right: 5px;
    background: #764ba2;
  }

  .contact button:hover {
    background: #5b3c8a;
  }
</style>

</head>
<body>

  <body>

<div class="container">
  <h1>JS Contact Manager</h1>

  <input type="text" id="name" placeholder="Enter Name">
  <input type="email" id="email" placeholder="Enter Email">
  <input type="number" id="phone" placeholder="Enter Phone">

  <button onclick="addContact()">Add Contact</button>

  <div id="contactList"></div>
</div>


  <script>
    const API_URL = "http://localhost:5000/api/contacts";
    let contacts = [];
    let editId = null;

    // Fetch contacts from the server
    async function fetchContacts() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('Failed to fetch contacts');
        contacts = await response.json();
        displayContacts();
      } catch (error) {
        console.error("Error fetching contacts:", error);
        alert("Error loading contacts. Please ensure the server is running.");
      }
    }

    async function addContact() {
      let name = document.getElementById("name").value.trim();
      let email = document.getElementById("email").value.trim();
      let phone = document.getElementById("phone").value.trim();

      if (name === "" || email === "" || phone === "") {
        alert("All fields are required!");
        return;
      }

      let contactData = { name, email, phone };

      try {
        if (editId === null) {
          // Add new contact
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(contactData)
          });
          
          if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error || 'Failed to add contact');
          }
        } else {
          // Update existing contact
          const response = await fetch(`${API_URL}/${editId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(contactData)
          });
          
          if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error || 'Failed to update contact');
          }
          editId = null;
        }

        // Clear input fields
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("phone").value = "";

        // Refresh list
        fetchContacts();
      } catch (error) {
        console.error("Error saving contact:", error);
        alert(error.message);
      }
    }

    function displayContacts() {
      let list = document.getElementById("contactList");
      list.innerHTML = "";

      for (let i = 0; i < contacts.length; i++) {
        let contactDiv = document.createElement("div");
        contactDiv.className = "contact";

        contactDiv.innerHTML =
          "<b>" + contacts[i].name + "</b><br>" +
          contacts[i].email + "<br>" +
          contacts[i].phone + "<br>" +
          `<button onclick="editContact('${contacts[i]._id}')">Edit</button>` +
          `<button onclick="deleteContact('${contacts[i]._id}')">Delete</button>`;

        list.appendChild(contactDiv);
      }
    }

    async function deleteContact(id) {
      if (!confirm("Are you sure you want to delete this contact?")) return;

      try {
        const response = await fetch(`${API_URL}/${id}`, {
          method: "DELETE"
        });

        if (!response.ok) throw new Error('Failed to delete contact');
        
        fetchContacts();
      } catch (error) {
        console.error("Error deleting contact:", error);
        alert("Error deleting contact.");
      }
    }

    function editContact(id) {
      const contact = contacts.find(c => c._id === id);
      if (!contact) return;

      document.getElementById("name").value = contact.name;
      document.getElementById("email").value = contact.email;
      document.getElementById("phone").value = contact.phone;

      editId = id;
    }

    // Initial load
    fetchContacts();

  </script>
</body>
</html>
